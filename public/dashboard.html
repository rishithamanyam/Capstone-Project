<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SIMS</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="root"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw '';

document.getElementById('root').innerHTML = `
  ${sidebar('dashboard')}
  <div class="main">
    ${topbar('Dashboard', 'SIMS / Dashboard')}
    <div class="content">

      <div class="stats-grid">
        <div class="scard gi">
          <div class="scard-top">
            <div><div class="scard-val" id="d-items">—</div><div class="scard-lbl">Total Items</div></div>
            <div class="scard-ico">📦</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 25 Q50 5 100 25 Q150 45 200 25 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
        <div class="scard ge">
          <div class="scard-top">
            <div><div class="scard-val" id="d-val">—</div><div class="scard-lbl">Portfolio Value</div></div>
            <div class="scard-ico">💰</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 30 Q40 10 80 25 Q130 42 200 20 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
        <div class="scard ga">
          <div class="scard-top">
            <div><div class="scard-val" id="d-low">—</div><div class="scard-lbl">Low Stock Alerts</div></div>
            <div class="scard-ico">⚠️</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 20 Q60 40 100 20 Q150 0 200 25 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
        <div class="scard gr">
          <div class="scard-top">
            <div><div class="scard-val" id="d-out">—</div><div class="scard-lbl">Out of Stock</div></div>
            <div class="scard-ico">❌</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 15 Q50 35 100 15 Q160 -5 200 20 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
        <div class="scard gc">
          <div class="scard-top">
            <div><div class="scard-val" id="d-cats">—</div><div class="scard-lbl">Categories</div></div>
            <div class="scard-ico">🏷️</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 28 Q70 8 120 28 Q160 42 200 22 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
        <div class="scard gp">
          <div class="scard-top">
            <div><div class="scard-val" id="d-units">—</div><div class="scard-lbl">Total Units</div></div>
            <div class="scard-ico">🔢</div>
          </div>
          <div class="scard-wave"><svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 22 Q55 38 110 18 Q160 2 200 26 L200 40 L0 40 Z" fill="rgba(255,255,255,0.12)"/></svg></div>
        </div>
      </div>

      <div class="g2">
        <div class="card">
          <div class="card-head"><h3>📊 Stock by Category</h3><span id="cat-total" class="tag"></span></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="cat-chart"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head"><h3>🩺 Stock Health</h3></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="health-chart"></canvas></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>⚠️ Items Needing Attention</h3>
          <a href="/inventory" class="btn btn-outline btn-sm">View All →</a>
        </div>
        <div class="card-body" id="low-body">
          <div style="color:#94a3b8;text-align:center;padding:20px">Loading...</div>
        </div>
      </div>

    </div>
  </div>`;

const COLORS = ['#4f46e5','#10b981','#f59e0b','#ef4444','#06b6d4','#a855f7','#f97316','#14b8a6'];

async function load() {
  const [sum, cats, health, low] = await Promise.all([
    get('/analytics/summary'),
    get('/analytics/by-category'),
    get('/analytics/stock-status'),
    get('/analytics/low-stock')
  ]);

  if (sum) {
    document.getElementById('d-items').textContent  = sum.totalItems;
    document.getElementById('d-val').textContent    = fmt(sum.totalValue);
    document.getElementById('d-low').textContent    = sum.lowStock;
    document.getElementById('d-out').textContent    = sum.outOfStock;
    document.getElementById('d-cats').textContent   = sum.categories;
    document.getElementById('d-units').textContent  = sum.totalUnits;
  }

  if (cats && cats.length) {
    document.getElementById('cat-total').textContent = cats.length + ' categories';
    new Chart(document.getElementById('cat-chart'), {
      type: 'bar',
      data: { labels: cats.map(c => c.category), datasets: [{ label: 'Units', data: cats.map(c => c.total_qty), backgroundColor: COLORS, borderRadius: 7, borderSkipped: false }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } }, x: { grid: { display: false }, ticks: { font: { size: 11 } } } } }
    });
  }

  if (health) {
    new Chart(document.getElementById('health-chart'), {
      type: 'doughnut',
      data: { labels: ['Good','Medium','Low Stock','Out of Stock'], datasets: [{ data: [health.good, health.medium, health.low, health.out_of_stock], backgroundColor: ['#10b981','#06b6d4','#f59e0b','#ef4444'], borderWidth: 3, borderColor: '#fff' }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '68%', plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 }, usePointStyle: true } } } }
    });
  }

  const lb = document.getElementById('low-body');
  if (low && low.length) {
    lb.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Item</th><th>Category</th><th>Stock Level</th><th>Min Required</th><th>Unit Price</th><th>Status</th><th></th></tr></thead>
      <tbody>${low.map(i => {
        const pct = Math.min(100, Math.round((i.quantity / Math.max(i.min_stock * 2, 1)) * 100));
        const col = i.quantity === 0 ? '#ef4444' : '#f59e0b';
        return `<tr class="${i.quantity === 0 ? 'row-out' : 'row-low'}">
          <td><strong>${i.name}</strong></td>
          <td>${catBadge(i.category)}</td>
          <td><div class="stock-bar"><strong style="color:${col};min-width:28px">${i.quantity}</strong><div class="stock-track"><div class="stock-fill" style="width:${pct}%;background:${col}"></div></div></div></td>
          <td>${i.min_stock}</td>
          <td>${fmt(i.price)}</td>
          <td>${stockBadge(i.quantity, i.min_stock)}</td>
          <td><a href="/inventory" class="btn btn-xs btn-primary">Restock</a></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  } else {
    lb.innerHTML = '<div class="empty-state"><div class="ei">✅</div><h4>All items are well stocked!</h4><p>No items below minimum thresholds.</p></div>';
  }

  loadNbadge();
}

load();
</script>
</body>
</html>
