spring.application.name=customer-service-dashboard
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/csddb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:WiproCapstoneProjectSecretKey2024CustomerServiceDashboard}
jwt.expiration=${JWT_EXPIRATION:86400000}

resilience4j.circuitbreaker.instances.ticketService.sliding-window-size=10
resilience4j.circuitbreaker.instances.ticketService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ticketService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ticketService.permitted-number-of-calls-in-half-open-state=3

spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
