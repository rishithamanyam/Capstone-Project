<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — CSD</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1>My Profile</h1>
        <div class="breadcrumb">Home / Profile</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-avatar" id="topbar-avatar"></div>
      </div>
    </div>

    <div class="page">
      <div style="max-width:700px">

        <!-- Profile Card -->
        <div class="card" style="margin-bottom:20px">
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
            <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800" id="profile-avatar">?</div>
            <div>
              <div style="font-size:20px;font-weight:800" id="profile-name">—</div>
              <div id="profile-role-badge" style="margin-top:4px"></div>
              <div style="font-size:13px;color:#64748b;margin-top:4px" id="profile-email">—</div>
            </div>
          </div>

          <div class="card-header" style="padding-bottom:16px;border-bottom:1px solid #f1f5f9">
            <div class="card-title">Personal Information</div>
          </div>

          <div class="grid-2" style="margin-top:16px">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="p-name" placeholder="Your full name">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="p-phone" placeholder="10-digit number">
            </div>
          </div>

          <div class="form-group" id="location-field">
            <label>Location</label>
            <select id="p-location">
              <option value="">Select city</option>
              <option>New York</option><option>Los Angeles</option><option>Chicago</option>
              <option>Houston</option><option>Phoenix</option><option>Philadelphia</option>
            </select>
          </div>

          <div style="text-align:right">
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card">
          <div class="card-header"><div class="card-title">Change Password</div></div>
          <div class="form-group" style="margin-top:4px">
            <label>Current Password</label>
            <input type="password" id="cp-current" placeholder="Enter current password">
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="cp-new" placeholder="Create new password">
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="cp-confirm" placeholder="Repeat new password">
            </div>
          </div>
          <div style="text-align:right">
            <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (!requireAuth()) { }

  const user = getUser();
  buildSidebar(user.role, 'profile');
  initTopbar();

  async function loadProfile() {
    const data = await api('/api/auth/me');
    if (!data) return;

    document.getElementById('profile-avatar').textContent = buildAvatar(data.name);
    document.getElementById('profile-name').textContent   = data.name;
    document.getElementById('profile-email').textContent  = data.email;
    document.getElementById('profile-role-badge').innerHTML = roleBadge(data.role);

    document.getElementById('p-name').value  = data.name  || '';
    document.getElementById('p-phone').value = data.phone || '';

    const locEl = document.getElementById('p-location');
    if (data.role === 'CUSTOMER' || data.role === 'customer') {
      if (data.location) locEl.value = data.location;
    } else {
      document.getElementById('location-field').style.display = 'none';
    }
  }

  async function saveProfile() {
    const body = {
      name:     document.getElementById('p-name').value.trim(),
      phone:    document.getElementById('p-phone').value.trim(),
      location: document.getElementById('p-location').value || undefined
    };
    if (!body.name) { showToast('Name cannot be empty', 'error'); return; }
    const res = await api('/api/auth/profile', 'PUT', body);
    if (res && res.success) {
      showToast('Profile updated successfully!', 'success');
      const u = getUser(); u.name = body.name; sessionStorage.setItem('user', JSON.stringify(u));
      loadProfile();
    } else showToast(res?.message || 'Update failed', 'error');
  }

  async function changePassword() {
    const current = document.getElementById('cp-current').value;
    const newPass = document.getElementById('cp-new').value;
    const confirm = document.getElementById('cp-confirm').value;
    if (!current || !newPass) { showToast('Fill in all password fields', 'error'); return; }
    if (newPass !== confirm)  { showToast('Passwords do not match', 'error'); return; }
    if (newPass.length < 6)   { showToast('Password must be at least 6 characters', 'error'); return; }

    const res = await api('/api/auth/change-password', 'PUT', { currentPassword: current, newPassword: newPass });
    if (res && res.success) {
      showToast('Password changed successfully!', 'success');
      document.getElementById('cp-current').value = '';
      document.getElementById('cp-new').value     = '';
      document.getElementById('cp-confirm').value = '';
    } else showToast(res?.message || 'Change failed', 'error');
  }

  loadProfile();
</script>
</body>
</html>
